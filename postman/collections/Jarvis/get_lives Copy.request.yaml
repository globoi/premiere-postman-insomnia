$kind: graphql-request
url: https://74676cf5-23ff-4cf1-aa96-c265a46de3db.mock.pstmn.io/graphql
query: |
  query Broadcasts($filtersInput: BroadcastInput) {
    broadcasts(filtersInput: $filtersInput) {
      mediaId
      transmissionId
      name
      media {
        description
        title {
          headline
        }
        headline
        thumb
        channel {
          id
        }
        authorizationExternalIds {
          aeid
          type
        }
      }
      channelId
      slug
      epgCurrentSlots(limit: 1) {
        relatedEventId
        name
        description
        relatedEvent {
          ... on SoccerMatch {
            id
            matchId
          }
        }
      }
    }
  }
variables: |-
  {
      "affiliateCode": "RJ"
  }
headers:
  x-platform-id: back-end
  x-device-id: undefined
  x-client-version: 1_0
  x-tenant-id: premiere
order: 2000
