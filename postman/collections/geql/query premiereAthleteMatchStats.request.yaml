$kind: graphql-request
name: query premiereAthleteMatchStats
url: "{{geql_url}}/graphql"
query: |-
  query GetPlayerStatisticsByMatchId($filter: PremiereAthleteMatchStatsFilter!) {
      premiereAthleteMatchStats(filter: $filter) {
          athleteId
          matchId
          athlete {
              name
              nationality {
                  name
              }
              birthday
              age
              weigth
              heigth
              position {
                  description
              }
              popularName
              photoURL(filter: {size: x220})
          }
          matchAthlete {
              shirtNumber
              contextualPhoto(filter: {kind: HIGHLIGHT}) {
                  url
              }
          }
          team {
              popularName
              colors {
                  primary
              }
              name
              badge(format: "30x30")
          }
          championshipSummary(limit: 2) {
              name
              key
              value
          }
          segmentedStats {
              sectionName
              stats {
                  name
                  key
                  value
              }
          }
      }
  }
variables: |-
  {
      "filter": {
          "athleteId": 94583,
          "matchId": 352075
      }
  }
schema:
  source: auto
examples: .resources/query premiereAthleteMatchStats.resources/examples
order: 3000
