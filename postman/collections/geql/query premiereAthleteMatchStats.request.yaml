$kind: graphql-request
url: "{{geql_url}}/graphql"
query: |-
  query premiereAthleteMatchStats($filter: PremiereAthleteMatchStatsFilter!) {
    premiereAthleteMatchStats(filter: $filter) {
      athleteId
      matchId
      athlete {
        name
        nationality {
          name
        }
        birthday
        age
        weigth
        heigth
        position {
          description
        }
        popularName
        photoURL(filter: {size: x220})
      }
      matchAthlete {
        contextualPhoto(filter: {kind: HIGHLIGHT}) {
            url
          }
          shirtNumber
      }
      team {
        name
        badge(format: "30x30")
      }
      championshipSummary(limit: 2) {
        name
        key
        value
      }
      segmentedStats {
        sectionName
        stats {
          name
          key
          value
        }
      }
    }
  }
variables: |-
  {
      "filter": {
          "athleteId": 42135,
          "matchId": 346484
      }
  }
examples: ./.resources/query premiereAthleteMatchStats.resources/examples
order: 3000
