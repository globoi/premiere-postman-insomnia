$kind: graphql-request
name: query premiereAthleteMatchStats (old)
url: "{{geql_url}}/graphql"
query: |
  query premiereAthleteMatchStats($filter: PremiereAthleteMatchStatsFilter!) {
    premiereAthleteMatchStats(filter: $filter) {
      athleteId
      matchId
      basicInfo {
        name
        popularName
        position
        athlete {
          photoURL(filter: { size: x220 })
        }
      }
      personalDetails {
        club
        nationality
        age
        weight
        height
      }
      championshipSummary {
        name
        key
        value
      }
      segmentedStats {
        sectionName
        stats {
          name
          key
          value
        }
      }
    }
  }
variables: |-
  {
      "filter": {
          "athleteId": 132071,
          "matchId": 346200
      }
  }
schema:
  source: auto
order: 5000
